<!DOCTYPE html>
<html>
<head>
    <title>RCC Icon Generator</title>
</head>
<body>
    <h1>Generating RCC Icons...</h1>
    <canvas id="canvas192" width="192" height="192"></canvas>
    <canvas id="canvas512" width="512" height="512"></canvas>
    
    <script>
        function createIcon(canvas, size) {
            const ctx = canvas.getContext('2d');
            
            // Purple gradient background
            const gradient = ctx.createLinearGradient(0, 0, size, size);
            gradient.addColorStop(0, '#667eea');
            gradient.addColorStop(1, '#764ba2');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, size, size);
            
            // White "RCC" text
            ctx.fillStyle = 'white';
            ctx.font = `bold ${size * 0.25}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('RCC', size / 2, size / 2);
            
            // Download
            const link = document.createElement('a');
            link.download = `icon-${size}.png`;
            link.href = canvas.toDataURL();
            link.click();
        }
        
        // Generate both icons
        setTimeout(() => {
            createIcon(document.getElementById('canvas192'), 192);
            setTimeout(() => {
                createIcon(document.getElementById('canvas512'), 512);
                document.body.innerHTML += '<h2>✅ Icons downloaded! Check your Downloads folder!</h2>';
            }, 500);
        }, 500);
    </script>
</body>
</html>
