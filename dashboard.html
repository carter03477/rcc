<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 Rocky Command Centre (RCC)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }
        
        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        header p {
            font-size: 1.2em;
            opacity: 0.9;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease;
        }
        
        .card:hover {
            transform: translateY(-5px);
        }
        
        .card h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.5em;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .event-item, .contact-item, .task-item, .note-item {
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            background: #f8f9fa;
            border-left: 4px solid #667eea;
        }
        
        .event-item.sport {
            border-left-color: #FF6B35;
        }
        
        .event-item.school {
            border-left-color: #4ECDC4;
        }
        
        .event-item.music {
            border-left-color: #FFE66D;
        }
        
        .task-item.completed {
            opacity: 0.6;
            text-decoration: line-through;
        }
        
        .event-title {
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .event-time {
            color: #666;
            font-size: 0.9em;
        }
        
        .contact-name {
            font-weight: bold;
            color: #333;
        }
        
        .contact-category {
            display: inline-block;
            padding: 3px 8px;
            background: #667eea;
            color: white;
            border-radius: 12px;
            font-size: 0.8em;
            margin-top: 5px;
        }
        
        .empty-state {
            text-align: center;
            padding: 30px;
            color: #999;
            font-style: italic;
        }
        
        .priority-high {
            border-left-color: #FF6B35;
        }
        
        .priority-medium {
            border-left-color: #FFE66D;
        }
        
        .priority-low {
            border-left-color: #4ECDC4;
        }
        
        .note-date {
            font-size: 0.85em;
            color: #999;
            margin-top: 8px;
        }
        
        footer {
            text-align: center;
            color: white;
            margin-top: 30px;
            padding: 20px;
            opacity: 0.8;
        }
        
        .refresh-note {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 ROCKY COMMAND CENTRE</h1>
            <p>Your Personal Dashboard</p>
        </header>
        
        <div class="refresh-note">
            💡 Tell Rocky to add events, contacts, or tasks - then refresh this page to see updates!
        </div>
        
        <div class="grid">
            <!-- Calendar Section -->
            <div class="card">
                <h2>📅 Calendar</h2>
                <div id="calendar-list"></div>
            </div>
            
            <!-- Tasks Section -->
            <div class="card">
                <h2>✅ Tasks</h2>
                <div id="tasks-list"></div>
            </div>
        </div>
        
        <div class="grid">
            <!-- Contacts Section -->
            <div class="card">
                <h2>👥 Contacts</h2>
                <div id="contacts-list"></div>
            </div>
            
            <!-- Notes Section -->
            <div class="card">
                <h2>📝 Notes</h2>
                <div id="notes-list"></div>
            </div>
        </div>
        
        <footer>
            <p>Built by Carter & Rocky | Last updated: <span id="last-update"></span></p>
        </footer>
    </div>
    
    <script>
        // Load data from data.json
        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                // Render Calendar
                const calendarList = document.getElementById('calendar-list');
                if (data.calendar.length === 0) {
                    calendarList.innerHTML = '<div class="empty-state">No events yet! Ask Rocky to add some.</div>';
                } else {
                    calendarList.innerHTML = data.calendar.map(event => `
                        <div class="event-item ${event.category}">
                            <div class="event-title">${event.title}</div>
                            <div class="event-time">${event.time} - ${event.date}</div>
                        </div>
                    `).join('');
                }
                
                // Render Tasks
                const tasksList = document.getElementById('tasks-list');
                if (data.tasks.length === 0) {
                    tasksList.innerHTML = '<div class="empty-state">No tasks yet! Stay on top of things.</div>';
                } else {
                    tasksList.innerHTML = data.tasks.map(task => `
                        <div class="task-item priority-${task.priority} ${task.completed ? 'completed' : ''}">
                            <div class="event-title">${task.completed ? '✓ ' : ''}${task.title}</div>
                            <div class="event-time">Due: ${task.due}</div>
                        </div>
                    `).join('');
                }
                
                // Render Contacts
                const contactsList = document.getElementById('contacts-list');
                if (data.contacts.length === 0) {
                    contactsList.innerHTML = '<div class="empty-state">No contacts yet!</div>';
                } else {
                    contactsList.innerHTML = data.contacts.map(contact => `
                        <div class="contact-item">
                            <div class="contact-name">${contact.name}</div>
                            ${contact.phone ? `<div class="event-time">${contact.phone}</div>` : ''}
                            ${contact.notes ? `<div class="event-time">${contact.notes}</div>` : ''}
                            <span class="contact-category">${contact.category}</span>
                        </div>
                    `).join('');
                }
                
                // Render Notes
                const notesList = document.getElementById('notes-list');
                if (data.notes.length === 0) {
                    notesList.innerHTML = '<div class="empty-state">No notes yet!</div>';
                } else {
                    notesList.innerHTML = data.notes.map(note => `
                        <div class="note-item">
                            <div class="event-title">${note.title}</div>
                            <div>${note.content}</div>
                            <div class="note-date">${note.date}</div>
                        </div>
                    `).join('');
                }
                
                // Update timestamp
                document.getElementById('last-update').textContent = new Date().toLocaleString();
            })
            .catch(error => {
                console.error('Error loading data:', error);
                document.body.innerHTML = '<div style="color: white; text-align: center; padding: 50px;">Error loading dashboard. Make sure data.json is in the same folder!</div>';
            });
    </script>
</body>
</html>
